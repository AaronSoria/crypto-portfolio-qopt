services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.python
    image: crypto-portfolio-qopt-app:latest
    working_dir: /app
    volumes:
      - ./configs:/app/configs
      - ./data:/app/data
      - ./results:/app/results
    command: ["python", "scripts/run_experiment.py", "--config", "configs/experiments/example_mean_variance.yaml"]

  ingest:
    build:
      context: .
      dockerfile: Dockerfile.go
    image: crypto-portfolio-qopt-ingest:latest
    working_dir: /app
    volumes:
      - ./data:/app/data
    command: ["--provider", "coingecko", "--symbols", "BTC,ETH,SOL", "--vs-currency", "usd"]
