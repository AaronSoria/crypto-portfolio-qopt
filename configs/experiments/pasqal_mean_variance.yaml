experiment_name: pasqal_mean_variance_btc_eth_sol
seed: 42

data:
  source: json
  path: data/raw/market_snapshot.json

problem:
  type: mean_variance_binary
  risk_aversion: 0.5
  constraints:
    budget: 2
    penalty: 50.0

solver:
  parameters:
    max_iterations: 500

pasqal:
  backend: auto        # auto | numpy_rydberg | pulser_local | pulser_cloud | sa_hybrid
  n_shots: 1000
  n_time_steps: 100
  lattice_spacing_um: 10.5
  blockade_radius_um: 7.0
  # Pulse parameters — must respect AnalogDevice hardware limits:
  #   max_amp (Omega):    12.566 rad/us  (2pi x 2 MHz)
  #   max_abs_detuning:  125.66 rad/us  (2pi x 20 MHz)
  #   max_sequence_duration: 6000 ns
  omega_max: 12.5664     # rad/us — 2pi x 2 MHz (AnalogDevice max_amp = 12.566)
  delta_start: -31.4159  # rad/us — 2pi x -5 MHz
  delta_end:    31.4159  # rad/us — 2pi x +5 MHz
  use_pulser: true
  cloud_token: ""
  project_id: ""
