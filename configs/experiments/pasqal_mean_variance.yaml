experiment_name: pasqal_mean_variance_btc_eth_sol
seed: 42

data:
  source: json
  path: data/raw/market_snapshot.json

problem:
  type: mean_variance_binary
  risk_aversion: 0.5
  constraints:
    budget: 2       # override auto-default of n//3
    penalty: 50.0

solver:
  parameters:
    max_iterations: 500

pasqal:
  backend: auto        # auto | numpy_rydberg | pulser_local | pulser_cloud | sa_hybrid
  n_shots: 1000
  n_time_steps: 100
  lattice_spacing_um: 10.5
  blockade_radius_um: 7.0
  use_pulser: true
  cloud_token: ""      # or set PASQAL_CLOUD_TOKEN env var
  project_id: ""
